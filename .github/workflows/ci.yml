name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # mlugg/setup-zig still declares `using: node20` on its latest tag.
  # Opt JS actions into Node 24 now so the deprecation warning goes
  # quiet and we catch any upstream incompatibility early. Drop this
  # once setup-zig migrates to node24 (or June 2026, when GH flips
  # the default).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features
      - run: cargo test --workspace --doc --all-features
      - name: Build examples
        run: cargo build --workspace --examples --all-features
        # `--examples` is a no-op until examples land; harmless before then.

  build:
    name: Build ${{ matrix.target }}
    needs: [test]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            zigbuild_target: x86_64-unknown-linux-gnu.2.28
            zig: "true"
            macos_min: ""
            suffix: ""
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            zigbuild_target: aarch64-unknown-linux-gnu.2.28
            zig: "true"
            macos_min: ""
            suffix: ""
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            zigbuild_target: x86_64-unknown-linux-musl
            zig: "true"
            macos_min: ""
            suffix: ""
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            zigbuild_target: ""
            zig: "false"
            macos_min: ""
            suffix: ".exe"
            archive: zip
          - os: macos-latest
            target: aarch64-apple-darwin
            zigbuild_target: ""
            zig: "false"
            macos_min: "11.0"
            suffix: ""
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            zigbuild_target: ""
            zig: "false"
            macos_min: "10.15"
            suffix: ""
            archive: tar.gz

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Verify tag matches Cargo.toml version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          CARGO_VER=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          if [ "v$CARGO_VER" != "$GITHUB_REF_NAME" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match workspace.package version v$CARGO_VER"
            exit 1
          fi

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy, rustfmt

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Setup zig
        if: matrix.zig == 'true'
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        if: matrix.zig == 'true'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      # fmt + clippy run in the jobs above on every PR/push; tagged releases
      # follow merged commits so re-running them here is redundant
      # (and clippy --target X needs cross C linkers we don't ship).

      - name: Build binary (zigbuild)
        if: matrix.zig == 'true'
        run: cargo zigbuild --release --locked --target ${{ matrix.zigbuild_target }} --bin sqeel

      - name: Build binary (native)
        if: matrix.zig == 'false'
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_min }}
        run: cargo build --release --locked --target ${{ matrix.target }} --bin sqeel

      - name: Package (Linux / macOS)
        if: matrix.archive == 'tar.gz'
        run: |
          TAG=${GITHUB_REF_NAME}
          ARCHIVE="sqeel-${TAG}-${{ matrix.target }}.tar.gz"
          mkdir -p dist
          cp target/${{ matrix.target }}/release/sqeel${{ matrix.suffix }} dist/
          cp README.md LICENSE dist/
          tar -czf "$ARCHIVE" -C dist .
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          fi

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $TAG = $env:GITHUB_REF_NAME
          $ARCHIVE = "sqeel-$TAG-${{ matrix.target }}.zip"
          New-Item -ItemType Directory -Force dist
          Copy-Item "target/${{ matrix.target }}/release/sqeel${{ matrix.suffix }}" dist/
          Copy-Item README.md, LICENSE dist/
          Compress-Archive -Path dist/* -DestinationPath $ARCHIVE
          $hash = (Get-FileHash -Algorithm SHA256 $ARCHIVE).Hash.ToLower()
          "$hash  $ARCHIVE" | Out-File -Encoding ASCII "$ARCHIVE.sha256"

      - name: Upload archives + sha256
        if: >-
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
        uses: softprops/action-gh-release@v3
        with:
          files: |
            sqeel-*.${{ matrix.archive }}
            sqeel-*.${{ matrix.archive }}.sha256
          fail_on_unmatched_files: true
          generate_release_notes: ${{ matrix.target == 'x86_64-unknown-linux-gnu' }}
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # AUR auto-publish for `sqeel-bin`. Pulls the just-uploaded tarball
  # checksums off the release, renders pkg/aur/PKGBUILD-bin.in,
  # generates .SRCINFO, and pushes to the AUR repo over SSH. Lives here
  # (not a separate workflow) because GITHUB_TOKEN-created releases don't
  # fire downstream `on: release` triggers; running as a
  # `needs: [build]` job sidesteps the cascade entirely.
  #
  # Required org/repo secret:
  #   AUR_SSH_KEY  — ed25519 private key whose public half is registered
  #                  on the AUR account that owns the `sqeel-bin` package.
  aur-bin:
    name: Publish sqeel-bin to AUR
    needs: [build]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install build deps
        run: |
          set -euo pipefail
          # base-devel pulls in makepkg + fakeroot. openssh + git for
          # the AUR push. curl fetches the sha256 sidecars off the
          # release without needing the GitHub CLI.
          pacman -Sy --noconfirm --needed base-devel git openssh curl

      - uses: actions/checkout@v6

      - name: Resolve version
        id: tag
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release tag: $TAG (pkgver=$VERSION)"

      - name: Fetch tarball sha256 sidecars
        id: sha
        run: |
          set -euo pipefail
          V="${{ steps.tag.outputs.version }}"
          BASE="https://github.com/kryptic-sh/sqeel/releases/download/v${V}"
          # The build matrix uploaded both arches before this job ran
          # (we `needs: [build]`), so the sidecars are guaranteed to exist.
          for arch in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            curl -fsSL "$BASE/sqeel-v${V}-${arch}.tar.gz.sha256" -o "sha.${arch}"
          done
          # sidecar format: `<hash>  <filename>` — keep first column.
          echo "x86_64=$(awk '{print $1}' sha.x86_64-unknown-linux-gnu)" >> "$GITHUB_OUTPUT"
          echo "aarch64=$(awk '{print $1}' sha.aarch64-unknown-linux-gnu)" >> "$GITHUB_OUTPUT"

      - name: Render PKGBUILD
        run: |
          set -euo pipefail
          mkdir -p out
          sed \
            -e "s/{VERSION}/${{ steps.tag.outputs.version }}/g" \
            -e "s/{SHA256_X86_64}/${{ steps.sha.outputs.x86_64 }}/g" \
            -e "s/{SHA256_AARCH64}/${{ steps.sha.outputs.aarch64 }}/g" \
            pkg/aur/PKGBUILD-bin.in > out/PKGBUILD
          echo "--- rendered PKGBUILD ---"
          cat out/PKGBUILD

      - name: Generate .SRCINFO
        run: |
          set -euo pipefail
          # makepkg refuses to run as root. The archlinux:latest image's
          # `nobody` user has an expired password (`su: User account has
          # expired`), so we provision a fresh build user instead.
          useradd -m builder
          chown -R builder:builder out
          # `su` parses options BEFORE the username; anything after gets
          # passed to the shell. Put `-s` first so it's interpreted as
          # the shell flag, not stdin-mode for bash.
          su -s /bin/bash builder -c 'cd out && makepkg --printsrcinfo > .SRCINFO'
          echo "--- .SRCINFO ---"
          cat out/.SRCINFO

      - name: Configure SSH for AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          set -euo pipefail
          install -dm700 ~/.ssh
          printf '%s\n' "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur

      - name: Push to AUR
        # `GIT_SSH_COMMAND` injects ssh options inline so we don't depend
        # on `~/.ssh/config` parsing. `accept-new` writes the AUR host
        # key to known_hosts on first connect; subsequent connects
        # strict-verify.
        env:
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/aur -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts"
        run: |
          set -euo pipefail
          git config --global user.name  "sqeel-ci"
          git config --global user.email "ci@kryptic.sh"
          git clone ssh://aur@aur.archlinux.org/sqeel-bin.git aur-repo
          cp out/PKGBUILD out/.SRCINFO aur-repo/
          cp pkg/aur/LICENSE pkg/aur/.gitignore aur-repo/
          cd aur-repo
          git add PKGBUILD .SRCINFO LICENSE .gitignore
          if git diff --cached --quiet; then
            echo "no changes vs current AUR head; nothing to push"
            exit 0
          fi
          git commit -m "sqeel-bin ${{ steps.tag.outputs.version }}-1"
          git push origin master

  # Alpine .apk for `sqeel`. Pulls the just-uploaded musl tarball off the
  # release, renders pkg/alpine/APKBUILD.in with version + sha512, builds
  # an unsigned package via abuild inside an alpine:latest container, and
  # uploads the .apk back to the same release. Lives here so it runs in
  # the same `needs: [build]` cascade as aur-bin.
  alpine:
    name: Build .apk for Alpine (x86_64)
    needs: [build]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    container: alpine:latest
    permissions:
      contents: write
    steps:
      - name: Install build deps
        run: |
          set -euo pipefail
          # alpine-sdk pulls in abuild + fakeroot + build-base. curl/bash
          # for the asset fetch + workflow scripting. coreutils for a
          # GNU-flavored sha512sum that accepts the same `awk '{print $1}'`
          # split we use elsewhere in this file.
          apk add --no-cache alpine-sdk bash curl coreutils

      - uses: actions/checkout@v6

      - name: Resolve version
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release tag: $TAG (pkgver=$VERSION)"

      - name: Fetch musl tarball + compute sha512
        id: sha
        shell: bash
        run: |
          set -euo pipefail
          V="${{ steps.tag.outputs.version }}"
          BASE="https://github.com/kryptic-sh/sqeel/releases/download/v${V}"
          # Sidecars on the release are sha256; abuild wants sha512, so
          # re-hash the tarball locally rather than depending on a second
          # sidecar format.
          TARBALL="sqeel-v${V}-x86_64-unknown-linux-musl.tar.gz"
          curl -fsSL "$BASE/$TARBALL" -o "$TARBALL"
          SHA512=$(sha512sum "$TARBALL" | awk '{print $1}')
          echo "sha512=$SHA512" >> "$GITHUB_OUTPUT"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Render APKBUILD
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          sed \
            -e "s|{VERSION}|${{ steps.tag.outputs.version }}|g" \
            -e "s|{SHA512_X86_64}|${{ steps.sha.outputs.sha512 }}|g" \
            pkg/alpine/APKBUILD.in > out/APKBUILD
          # abuild reads the source from $SRCDEST when present; drop the
          # already-downloaded tarball there so we don't refetch.
          mkdir -p out/src
          cp "${{ steps.sha.outputs.tarball }}" out/src/
          echo "--- rendered APKBUILD ---"
          cat out/APKBUILD

      - name: Build .apk
        shell: bash
        run: |
          set -euo pipefail
          # abuild refuses to run as root. Provision a build user with
          # sudo rights so it can install build-time deps if any get
          # added later.
          adduser -D builder
          addgroup builder abuild
          # /var/cache/distfiles is abuild's default SRCDEST; let the
          # builder user write there.
          mkdir -p /var/cache/distfiles
          chown builder:abuild /var/cache/distfiles
          chmod 775 /var/cache/distfiles
          chown -R builder:builder out
          # Generate a throwaway signing key. The .apk is published
          # unsigned-from-the-user's-POV (they `apk add --allow-untrusted`
          # the file), but abuild still wants a key to sign the index it
          # writes alongside.
          su builder -c 'abuild-keygen -a -n'
          # abuild's final step writes a signed APKINDEX; the signing
          # check rejects packages whose pubkey isn't in /etc/apk/keys.
          # Install the throwaway pubkey there so the index step passes.
          cp /home/builder/.abuild/*.rsa.pub /etc/apk/keys/
          # -F: force build even though we're not in an aports tree.
          # -r: install missing build deps automatically.
          su builder -c 'cd out && SRCDEST=/var/cache/distfiles cp src/*.tar.gz /var/cache/distfiles/ && abuild -F -r'
          # Default PKGDEST is ~builder/packages/<pkgrepo>/<arch>/
          APK=$(find /home/builder/packages -name 'sqeel-*.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "::error::no .apk produced"
            find /home/builder/packages -type f
            exit 1
          fi
          cp "$APK" .
          APK_NAME=$(basename "$APK")
          sha256sum "$APK_NAME" > "$APK_NAME.sha256"
          echo "built: $APK_NAME"

      - name: Upload .apk + sha256
        uses: softprops/action-gh-release@v3
        with:
          files: |
            sqeel-*.apk
            sqeel-*.apk.sha256
          fail_on_unmatched_files: true
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Homebrew tap auto-publish for `sqeel`. Pulls the just-uploaded macOS
  # tarball checksums off the release, renders pkg/homebrew/sqeel.rb.in,
  # and pushes the formula to kryptic-sh/homebrew-tap over SSH. Mirrors
  # the aur-bin job shape; same `needs: [build]` cascade so the macOS
  # sidecars are guaranteed to exist by the time this runs.
  #
  # Required org/repo secret:
  #   BREW_SSH_KEY  — ed25519 private key whose public half is registered
  #                   as a deploy key (write access) on
  #                   kryptic-sh/homebrew-tap. Org-level SELECTED-scope —
  #                   already granted to this repo.
  brew-tap:
    name: Publish sqeel formula to homebrew-tap
    needs: [build]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        id: tag
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release tag: $TAG (formula version=$VERSION)"

      - name: Fetch macOS sha256 sidecars
        id: sha
        run: |
          set -euo pipefail
          V="${{ steps.tag.outputs.version }}"
          BASE="https://github.com/kryptic-sh/sqeel/releases/download/v${V}"
          for arch in aarch64-apple-darwin x86_64-apple-darwin; do
            curl -fsSL "$BASE/sqeel-v${V}-${arch}.tar.gz.sha256" -o "sha.${arch}"
          done
          echo "aarch64=$(awk '{print $1}' sha.aarch64-apple-darwin)" >> "$GITHUB_OUTPUT"
          echo "x86_64=$(awk '{print $1}' sha.x86_64-apple-darwin)" >> "$GITHUB_OUTPUT"

      - name: Render formula
        run: |
          set -euo pipefail
          mkdir -p out
          sed \
            -e "s|{VERSION}|${{ steps.tag.outputs.version }}|g" \
            -e "s|{SHA256_AARCH64_DARWIN}|${{ steps.sha.outputs.aarch64 }}|g" \
            -e "s|{SHA256_X86_64_DARWIN}|${{ steps.sha.outputs.x86_64 }}|g" \
            pkg/homebrew/sqeel.rb.in > out/sqeel.rb
          echo "--- rendered formula ---"
          cat out/sqeel.rb

      - name: Configure SSH for homebrew-tap
        env:
          BREW_SSH_KEY: ${{ secrets.BREW_SSH_KEY }}
        run: |
          set -euo pipefail
          install -dm700 ~/.ssh
          printf '%s\n' "$BREW_SSH_KEY" > ~/.ssh/brew
          chmod 600 ~/.ssh/brew

      - name: Push formula to homebrew-tap
        env:
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/brew -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts"
        run: |
          set -euo pipefail
          git config --global user.name  "sqeel-ci"
          git config --global user.email "ci@kryptic.sh"
          git clone git@github.com:kryptic-sh/homebrew-tap.git tap
          mkdir -p tap/Formula
          cp out/sqeel.rb tap/Formula/sqeel.rb
          cd tap
          git add Formula/sqeel.rb
          if git diff --cached --quiet; then
            echo "no changes vs current tap head; nothing to push"
            exit 0
          fi
          git commit -m "sqeel ${{ steps.tag.outputs.version }}"
          git push origin HEAD:main

  publish-crates:
    name: Publish to crates.io
    needs: [build]
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Publish sqeel app to crates.io (idempotent)
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          # sqeel-core and sqeel-tui publish from their own repos (submodules
          # at crates/sqeel-core and crates/sqeel-tui). Only the sqeel umbrella
          # binary publishes from this monorepo.
          VERSION=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          URL="https://crates.io/api/v1/crates/sqeel/${VERSION}"
          if curl -fsS -A "sqeel-release-ci" -o /dev/null "$URL"; then
            echo "::notice::sqeel@${VERSION} already on crates.io, skipping"
            exit 0
          fi
          cargo publish -p sqeel --locked
