name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            glibc: "2.28"
            macos_min: ""
            suffix: ""
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            glibc: "2.28"
            macos_min: ""
            suffix: ""
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            glibc: ""
            macos_min: ""
            suffix: ".exe"
            archive: zip
          - os: macos-latest
            target: aarch64-apple-darwin
            glibc: ""
            macos_min: "11.0"
            suffix: ""
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            glibc: ""
            macos_min: "10.15"
            suffix: ""
            archive: tar.gz

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          CARGO_VER=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          if [ "v$CARGO_VER" != "$GITHUB_REF_NAME" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match workspace.package version v$CARGO_VER"
            exit 1
          fi

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy, rustfmt

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Setup zig
        if: matrix.glibc != ''
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        if: matrix.glibc != ''
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked --target ${{ matrix.target }} -- -D warnings

      - name: Build binaries (zigbuild)
        if: matrix.glibc != ''
        run: cargo zigbuild --release --locked --target ${{ matrix.target }}.${{ matrix.glibc }} --bin sqeel --bin sqeel-gui

      - name: Build binaries
        if: matrix.glibc == ''
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_min }}
        run: cargo build --release --locked --target ${{ matrix.target }} --bin sqeel --bin sqeel-gui

      - name: Package (Linux / macOS)
        if: matrix.archive == 'tar.gz'
        run: |
          TAG=${GITHUB_REF_NAME}
          ARCHIVE="sqeel-${TAG}-${{ matrix.target }}.tar.gz"
          mkdir -p dist
          cp target/${{ matrix.target }}/release/sqeel${{ matrix.suffix }} dist/
          cp target/${{ matrix.target }}/release/sqeel-gui${{ matrix.suffix }} dist/
          cp README.md LICENSE dist/
          tar -czf "$ARCHIVE" -C dist .
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          fi

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $TAG = $env:GITHUB_REF_NAME
          $ARCHIVE = "sqeel-$TAG-${{ matrix.target }}.zip"
          New-Item -ItemType Directory -Force dist
          Copy-Item "target/${{ matrix.target }}/release/sqeel${{ matrix.suffix }}" dist/
          Copy-Item "target/${{ matrix.target }}/release/sqeel-gui${{ matrix.suffix }}" dist/
          Copy-Item README.md, LICENSE dist/
          Compress-Archive -Path dist/* -DestinationPath $ARCHIVE
          $hash = (Get-FileHash -Algorithm SHA256 $ARCHIVE).Hash.ToLower()
          "$hash  $ARCHIVE" | Out-File -Encoding ASCII "$ARCHIVE.sha256"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            sqeel-*.${{ matrix.archive }}
            sqeel-*.${{ matrix.archive }}.sha256
          fail_on_unmatched_files: true
          generate_release_notes: ${{ matrix.target == 'x86_64-unknown-linux-gnu' }}
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Publish crates (dep order, idempotent)
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          publish_if_new() {
            local crate=$1
            local url="https://crates.io/api/v1/crates/${crate}/${VERSION}"
            if curl -fsS -o /dev/null "$url"; then
              echo "::notice::${crate}@${VERSION} already on crates.io, skipping"
              return 0
            fi
            cargo publish -p "$crate" --locked
          }
          # sqeel-core and sqeel-tui publish from their own repos (submodules
          # at crates/sqeel-core and crates/sqeel-tui). Only sqeel-gui and
          # the sqeel umbrella binary publish from this monorepo.
          publish_if_new sqeel-gui
          publish_if_new sqeel

  # AUR auto-publish for `sqeel-bin`. Pulls the just-uploaded tarball
  # checksums off the release, renders pkg/aur/PKGBUILD-bin.in,
  # generates .SRCINFO, and pushes to the AUR repo over SSH. Lives in
  # release.yml (not a separate workflow) because GITHUB_TOKEN-created
  # releases don't fire downstream `on: release` triggers; running as a
  # `needs: [build]` job sidesteps the cascade entirely.
  #
  # Required org/repo secret:
  #   AUR_SSH_KEY  — ed25519 private key whose public half is registered
  #                  on the AUR account that owns the `sqeel-bin` package.
  aur-bin:
    name: Publish sqeel-bin to AUR
    needs: [build]
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install build deps
        run: |
          set -euo pipefail
          # base-devel pulls in makepkg + fakeroot. openssh + git for
          # the AUR push. curl fetches the sha256 sidecars off the
          # release without needing the GitHub CLI.
          pacman -Sy --noconfirm --needed base-devel git openssh curl

      - uses: actions/checkout@v6

      - name: Resolve version
        id: tag
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release tag: $TAG (pkgver=$VERSION)"

      - name: Fetch tarball sha256 sidecars
        id: sha
        run: |
          set -euo pipefail
          V="${{ steps.tag.outputs.version }}"
          BASE="https://github.com/kryptic-sh/sqeel/releases/download/v${V}"
          # The build matrix uploaded both arches before this job ran
          # (we `needs: [build]`), so the sidecars are guaranteed to exist.
          for arch in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            curl -fsSL "$BASE/sqeel-v${V}-${arch}.tar.gz.sha256" -o "sha.${arch}"
          done
          # sidecar format: `<hash>  <filename>` — keep first column.
          echo "x86_64=$(awk '{print $1}' sha.x86_64-unknown-linux-gnu)" >> "$GITHUB_OUTPUT"
          echo "aarch64=$(awk '{print $1}' sha.aarch64-unknown-linux-gnu)" >> "$GITHUB_OUTPUT"

      - name: Render PKGBUILD
        run: |
          set -euo pipefail
          mkdir -p out
          sed \
            -e "s/{VERSION}/${{ steps.tag.outputs.version }}/g" \
            -e "s/{SHA256_X86_64}/${{ steps.sha.outputs.x86_64 }}/g" \
            -e "s/{SHA256_AARCH64}/${{ steps.sha.outputs.aarch64 }}/g" \
            pkg/aur/PKGBUILD-bin.in > out/PKGBUILD
          echo "--- rendered PKGBUILD ---"
          cat out/PKGBUILD

      - name: Generate .SRCINFO
        run: |
          set -euo pipefail
          # makepkg refuses to run as root. The archlinux:latest image's
          # `nobody` user has an expired password (`su: User account has
          # expired`), so we provision a fresh build user instead.
          useradd -m builder
          chown -R builder:builder out
          # `su` parses options BEFORE the username; anything after gets
          # passed to the shell. Put `-s` first so it's interpreted as
          # the shell flag, not stdin-mode for bash.
          su -s /bin/bash builder -c 'cd out && makepkg --printsrcinfo > .SRCINFO'
          echo "--- .SRCINFO ---"
          cat out/.SRCINFO

      - name: Configure SSH for AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          set -euo pipefail
          install -dm700 ~/.ssh
          printf '%s\n' "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur

      - name: Push to AUR
        # `GIT_SSH_COMMAND` injects ssh options inline so we don't depend
        # on `~/.ssh/config` parsing. `accept-new` writes the AUR host
        # key to known_hosts on first connect; subsequent connects
        # strict-verify.
        env:
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/aur -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -o UserKnownHostsFile=~/.ssh/known_hosts"
        run: |
          set -euo pipefail
          git config --global user.name  "sqeel-ci"
          git config --global user.email "ci@kryptic.sh"
          git clone ssh://aur@aur.archlinux.org/sqeel-bin.git aur-repo
          cp out/PKGBUILD out/.SRCINFO aur-repo/
          cp pkg/aur/LICENSE pkg/aur/.gitignore aur-repo/
          cd aur-repo
          git add PKGBUILD .SRCINFO LICENSE .gitignore
          if git diff --cached --quiet; then
            echo "no changes vs current AUR head; nothing to push"
            exit 0
          fi
          git commit -m "sqeel-bin ${{ steps.tag.outputs.version }}-1"
          git push origin master
