# cargo-nextest config.
#
# nextest runs each test in its own process, in parallel. Any test that
# builds a SQL `Highlighter` triggers a tree-sitter-sql grammar load,
# which clones into one fixed cache dir
# (`~/.cache/bonsai/grammars/sql-b9d109588d5b.tmp`). Run concurrently,
# multiple processes race the same `git init` / `remote add` / `fetch` /
# `checkout`, producing "remote origin already exists" /
# ".git/FETCH_HEAD: No such file" / "not a git repository" corruption.
# `cargo test`'s same-process thread pool happened to serialize them.
#
# Grammar-loading tests span two crates — `sqeel-core::highlight::tests`
# and `sqeel-tui::tests::apply_window_spans_*` (plus any future ones) —
# so both packages go into ONE single-threaded test group: at most one
# grammar-touching test runs at a time, across crates. `apps/sqeel`
# (CLI version/help tests, no grammar) stays fully parallel.
#
# Proper upstream fix (follow-up): hjkl-bonsai should clone into a
# per-process temp dir or hold a file lock over the clone.

[test-groups]
grammar-cache = { max-threads = 1 }
pty-e2e = { max-threads = 1 }

[[profile.default.overrides]]
filter = 'package(sqeel-core) | package(sqeel-tui)'
test-group = 'grammar-cache'

# ── pty-e2e ──────────────────────────────────────────────────────────────────
# The `sqeel` e2e suite spawns the real binary under a pty and asserts on
# rendered frames with timing-based polls. Parallel pty sessions on one
# runner skew each other's settle timing (and each spawns its own SQLite +
# tokio runtime), so cap the group to one test at a time — same effect as
# `--test-threads=1` scoped to just this suite.

[[profile.default.overrides]]
filter = 'package(sqeel) and binary(e2e)'
test-group = 'pty-e2e'
